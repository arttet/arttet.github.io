# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/refs/heads/master/internal/config/jsonschema.json

min_version: 2.0.0

pre-commit:
  parallel: true
  commands:
    oxfmt:
      glob: '*.{js,ts,svelte,json,css,md}'
      run: bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    oxlint:
      glob: '*.{js,ts,svelte}'
      run: bunx oxlint --fix --deny-warnings {staged_files}

    stylelint:
      glob: '*.{css,svelte}'
      run: bunx stylelint --fix {staged_files}
      stage_fixed: true

    markdownlint:
      glob: 'src/content/**/*.md'
      run: bunx markdownlint-cli2 --fix {staged_files}

    audit:
      run: bun audit

pre-push:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --redact --no-banner --staged

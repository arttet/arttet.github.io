# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/refs/heads/master/internal/config/jsonschema.json

min_version: 2.0.0

pre-commit:
  parallel: false
  commands:
    oxfmt:
      glob: '{*.{js,ts,svelte,json,css,yml,md},**/*.{js,ts,svelte,json,css,yml,md}}'
      run: bunx oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    oxlint:
      glob: '{*.{js,ts,svelte},**/*.{js,ts,svelte}}'
      run: bunx --bun oxlint --fix --deny-warnings {staged_files}

    stylelint:
      glob: '{*.{css,svelte},**/*.{css,svelte}}'
      run: bunx stylelint --fix {staged_files}
      stage_fixed: true

    markdownlint:
      glob: 'src/content/**/*.md'
      run: bunx --bun markdownlint-cli2 --fix {staged_files}

    cspell:
      glob: '{*.{md,svelte,ts},**/*.{md,svelte,ts}}'
      run: bunx --bun cspell --no-progress --no-summary --no-must-find-files {staged_files}

    audit:
      run: bun audit

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    gitleaks:
      run: gitleaks protect --redact --no-banner --staged

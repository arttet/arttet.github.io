name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint pipeline
        run: just lint

      - name: Type check
        run: bun run check

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: Build site
        run: bun run build

      - name: Run Playwright tests
        run: bun run test:playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: target/playwright-report/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/coverage/lcov.info

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: [ lint, test, coverage ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Analyze bundle size
        run: node scripts/bundle-report.mjs check --stats target/bundle/stats.json --baseline misc/bundle-baseline.json
          --threshold 0.3 --summary target/bundle/summary.md --json target/bundle/summary.json --fail false

      - name: Upload bundle report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundle-report
          path: target/bundle/

      - name: Enforce bundle budget
        run: |
          node -e "const fs = require('node:fs'); const report = JSON.parse(fs.readFileSync('target/bundle/summary.json', 'utf8')); if (report.comparison.failures.length > 0) { console.error(report.comparison.failures.join('\n')); process.exit(1); }"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./target/build

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

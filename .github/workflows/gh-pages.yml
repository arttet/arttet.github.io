name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Run Oxfmt
        run: bunx oxfmt --check .

      - name: Run OXlint
        run: bunx oxlint --deny-warnings .

      - name: Run Stylelint
        run: bunx stylelint "src/**/*.css" "src/**/*.svelte"

      - name: Run Knip
        run: bunx knip --no-config-hints

      - name: Run Markdownlint
        run: bunx markdownlint-cli2 "src/content/**/*.md"

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Playwright cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Build site
        run: bun run build

      - name: Run Playwright tests
        run: bun run test:playwright

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('target/playwright-report/**') != '' }}
        with:
          name: playwright-report
          path: target/playwright-report/

  coverage:
    name: Coverage
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bunx vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=target/test-results/vitest.junit.xml

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        with:
          fail_ci_if_error: true
          files: target/test-results/vitest.junit.xml
          flags: unittests
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        with:
          fail_ci_if_error: true
          files: target/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Run Lighthouse CI
        run: bunx lhci autorun

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('.lighthouseci/**') != '' }}
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true

      - name: Analyze bundle size
        run: >
          bun scripts/bundle-report.mjs check
          --fail false
          --stats target/bundle/stats.json
          --baseline misc/bundle-baseline.json
          --threshold 0.3 --summary target/bundle/summary.md
          --json target/bundle/summary.json

      - name: Upload bundle report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('target/bundle/**') != '' }}
        with:
          name: bundle-report
          path: target/bundle/

      - name: Upload site build
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && hashFiles('target/build/**') != '' }}
        with:
          name: site-build
          path: target/build/

      - name: Enforce bundle budget
        run: >
          bun --eval "
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('target/bundle/summary.json', 'utf8'));
          if (report.comparison.failures.length > 0) {
            console.error(report.comparison.failures.join('\n'));
            process.exit(1);
          }"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./target/build

  deploy-gh-pages:
    name: Deploy GitHub Pages
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-slim
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@v5

  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-slim
    needs: [test, build]

    permissions:
      contents: read
      pull-requests: write

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
      CF_INFRA_PAGES_PROJECT: ${{ vars.CF_INFRA_PAGES_PROJECT }}
      CF_SITE_BRANCH: pr-${{ github.event.pull_request.number }}
      CF_INFRA_BRANCH: pr-${{ github.event.pull_request.number }}
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
      HAS_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
      HAS_CF_SITE_PROJECT: ${{ vars.CF_PAGES_PROJECT != '' }}
      HAS_CF_INFRA_PROJECT: ${{ vars.CF_INFRA_PAGES_PROJECT != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download site build
        if: ${{ needs.build.result == 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: site-build
          path: target/build

      - name: Download Playwright report
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: playwright-report
          path: target/downloads/playwright-report

      - name: Download Lighthouse report
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: lighthouse-report
          path: target/downloads/lighthouse-report

      - name: Assemble infra pages
        run: >
          bun scripts/assemble-infra-pages.mjs
          --out target/infra-pages
          --playwright default=target/downloads/playwright-report
          --lighthouse target/downloads/lighthouse-report

      - name: Guard infra deploy
        id: guard
        run: |
          if [ -d target/infra-pages ] && [ -n "$(find target/infra-pages -mindepth 1 -print -quit)" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy app preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_SITE_PROJECT == 'true' && needs.build.result == 'success' }}
        id: cf_site_preview
        run: |
          bunx wrangler pages deploy ./target/build --project-name "$CF_PAGES_PROJECT" --branch "$CF_SITE_BRANCH"
          echo "preview_url=https://${CF_SITE_BRANCH}.${CF_PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy app production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_SITE_PROJECT == 'true' && needs.build.result == 'success' }}
        run: bunx wrangler pages deploy ./target/build --project-name "$CF_PAGES_PROJECT"

      - name: Publish infra links
        id: links
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            INFRA_URL="https://${CF_INFRA_BRANCH}.${CF_INFRA_PAGES_PROJECT}.pages.dev"
          else
            INFRA_URL="https://${CF_INFRA_PAGES_PROJECT}.pages.dev"
          fi
          export INFRA_URL
          echo "infra_url=${INFRA_URL}" >> "$GITHUB_OUTPUT"
          bun <<'EOF'
          const fs = require('node:fs');
          const links = JSON.parse(fs.readFileSync('target/infra-pages/links.json', 'utf8'));
          const infra = process.env.INFRA_URL;
          const playwright = links.playwright[0]?.href ? `${infra}${links.playwright[0].href}` : '';
          const lighthouse = links.lighthouse?.href ? `${infra}${links.lighthouse.href}` : '';
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `playwright_url=${playwright}\nlighthouse_url=${lighthouse}\n`,
          );
          EOF

      - name: Deploy infra preview to Cloudflare Pages
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_INFRA_PROJECT == 'true' && steps.guard.outputs.has_files == 'true' }}
        run: >
          bunx wrangler pages deploy ./target/infra-pages
          --project-name "$CF_INFRA_PAGES_PROJECT"
          --branch "$CF_INFRA_BRANCH"

      - name: Deploy infra production to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' && env.HAS_CF_ACCOUNT == 'true' && env.HAS_CF_INFRA_PROJECT == 'true' && steps.guard.outputs.has_files == 'true' }}
        run: >
          bunx wrangler pages deploy ./target/infra-pages
          --project-name "$CF_INFRA_PAGES_PROJECT"

      - name: Build sticky comment body
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        id: body
        env:
          APP_PREVIEW_URL: ${{ steps.cf_site_preview.outputs.preview_url }}
          INFRA_ROOT_URL: ${{ steps.links.outputs.infra_url }}
          PLAYWRIGHT_URL: ${{ steps.links.outputs.playwright_url }}
          LIGHTHOUSE_URL: ${{ steps.links.outputs.lighthouse_url }}
        run: bun scripts/build-preview-comment.mjs

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deployments
          message: ${{ steps.body.outputs.body }}
